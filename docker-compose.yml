services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports: ["8000:8000"]
    depends_on: [redis]

  worker:
    build: ./backend
    command: celery -A app.worker.celery_app worker --loglevel=info
    env_file: .env
    depends_on: [redis]

  # Optional internal ops console (Streamlit). Browse to http://localhost:8501
  ops:
    build: ./backend
    command: streamlit run streamlit/dashboard.py --server.port 8501 --server.address 0.0.0.0
    environment:
      - NEURALCUT_API_URL=http://api:8000
    env_file: .env
    ports: ["8501:8501"]
    depends_on: [api]

# Frontend runs outside compose during dev (cd frontend && npm run dev) for snappy
# hot-reload. Add it here later for a one-command full stack if you want.
